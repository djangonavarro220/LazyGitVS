name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-package-dogfood:
    name: Test, package, and dogfood
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release consistency check
        run: npm run check:release

      - name: Unit and integration tests
        run: npm test

      - name: Package VSIX
        run: npm run package:dist

      - name: UI dogfood
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            echo "UI dogfood attempt $attempt/2"
            if npm run dogfood:ui; then
              exit 0
            fi
            if [ "$attempt" = "2" ]; then
              echo "::error::UI dogfood failed after 2 attempts."
              exit 1
            fi
            rm -rf dogfood-output
            sleep 10
          done
        env:
          LGVS_DOGFOOD_THEME: Default Light Modern

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazygitvs-vsix
          path: dist/*.vsix
          if-no-files-found: error

      - name: Upload dogfood screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-output
          path: dogfood-output/
          if-no-files-found: ignore
