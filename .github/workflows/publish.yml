name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish, e.g. v0.1.91. Defaults to the current ref.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Check, package, release, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish tag
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package.json version $EXPECTED" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests
        run: npm test

      - name: Package VSIX
        run: npm run package:dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VSIX="$(ls dist/*.vsix | head -1)"
          NOTES="LazyGitVS ${{ steps.version.outputs.version }} release.\n\n- Built and tested by GitHub Actions.\n- VSIX attached below.\n- Marketplace publish runs from this workflow when VSCE_PAT is configured."
          gh release create "${{ steps.version.outputs.tag }}" "$VSIX" \
            --title "LazyGitVS ${{ steps.version.outputs.version }}" \
            --notes "$NOTES" \
          || gh release upload "${{ steps.version.outputs.tag }}" "$VSIX" --clobber

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::error::VSCE_PAT is not configured; Marketplace publish cannot run."
            exit 1
          fi
          VSIX="$(ls dist/*.vsix | head -1)"
          npx vsce publish --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazygitvs-${{ steps.version.outputs.version }}-vsix
          path: dist/*.vsix
          if-no-files-found: error
