name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish, e.g. v<version>. Defaults to the current ref.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Check, package, release, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/$INPUT_TAG:refs/tags/$INPUT_TAG"
          git checkout --detach "$INPUT_TAG"

      - name: Resolve publish tag
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package.json version $EXPECTED" >&2
            exit 1
          fi
          HEAD_SHA="$(git rev-parse HEAD)"
          TAG_SHA="$(git rev-list -n 1 "$TAG")"
          if [ "$HEAD_SHA" != "$TAG_SHA" ]; then
            echo "Checked out commit $HEAD_SHA does not match $TAG ($TAG_SHA)" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Marketplace token
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "::error::VSCE_PAT is not configured; Marketplace publish cannot run."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release consistency check
        run: npm run check:release

      - name: Tests
        run: npm test

      - name: UI dogfood
        run: npm run dogfood:ui
        env:
          LGVS_DOGFOOD_THEME: Default Light Modern

      - name: Package VSIX
        run: npm run package:dist

      - name: Upload dogfood screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dogfood-output-${{ steps.version.outputs.version }}
          path: dogfood-output/
          if-no-files-found: ignore

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          VSIX="$(ls dist/*.vsix | head -1)"
          npx vsce publish --packagePath "$VSIX" -p "$VSCE_PAT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VSIX="$(ls dist/*.vsix | head -1)"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          LazyGitVS ${{ steps.version.outputs.version }} release.

          - Built and tested by GitHub Actions.
          - VSIX attached below.
          - Published to the Visual Studio Marketplace by this workflow.
          EOF
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.version.outputs.tag }}" \
              --title "LazyGitVS ${{ steps.version.outputs.version }}" \
              --notes-file "$NOTES_FILE"
            gh release upload "${{ steps.version.outputs.tag }}" "$VSIX" --clobber
          else
            gh release create "${{ steps.version.outputs.tag }}" "$VSIX" \
              --title "LazyGitVS ${{ steps.version.outputs.version }}" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazygitvs-${{ steps.version.outputs.version }}-vsix
          path: dist/*.vsix
          if-no-files-found: error
